<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 830"
     font-family="-apple-system, system-ui, 'Segoe UI', Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#495057"/>
    </marker>
    <marker id="arrowSmall" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c757d"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#155724"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#004085"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="830" fill="#ffffff"/>

  <text x="600" y="36" font-size="20" font-weight="700"
        text-anchor="middle" fill="#212529">
    uniflow model
  </text>

  <text x="40" y="78" font-size="14" font-weight="700" fill="#212529">
    Modules <tspan font-weight="400" fill="#6c757d">- logical step chain each module knows about</tspan>
  </text>

  <g font-size="13">
    <text x="50" y="116" font-weight="700" fill="#a94442">Module A</text>
    <rect x="160" y="98" width="84" height="26" rx="4" fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="202" y="117" text-anchor="middle" fill="#a94442">A.Step 1</text>
    <line x1="244" y1="111" x2="276" y2="111" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="276" y="98" width="84" height="26" rx="4" fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="318" y="117" text-anchor="middle" fill="#a94442">A.Step 2</text>
    <line x1="360" y1="111" x2="392" y2="111" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="392" y="98" width="84" height="26" rx="4" fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="434" y="117" text-anchor="middle" fill="#a94442">A.Step 3</text>
    <line x1="476" y1="111" x2="508" y2="111" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="508" y="98" width="84" height="26" rx="4" fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="550" y="117" text-anchor="middle" fill="#a94442">A.Step 4</text>

    <text x="50" y="156" font-weight="700" fill="#1f4e79">Module B</text>
    <rect x="160" y="138" width="84" height="26" rx="4" fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="202" y="157" text-anchor="middle" fill="#1f4e79">B.Step 1</text>
    <line x1="244" y1="151" x2="276" y2="151" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="276" y="138" width="84" height="26" rx="4" fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="318" y="157" text-anchor="middle" fill="#1f4e79">B.Step 2</text>
    <line x1="360" y1="151" x2="392" y2="151" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="392" y="138" width="84" height="26" rx="4" fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="434" y="157" text-anchor="middle" fill="#1f4e79">B.Step 3</text>
    <line x1="476" y1="151" x2="508" y2="151" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="508" y="138" width="84" height="26" rx="4" fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="550" y="157" text-anchor="middle" fill="#1f4e79">B.Step 4</text>

    <text x="50" y="196" font-weight="700" fill="#1b5e20">Module C</text>
    <rect x="160" y="178" width="84" height="26" rx="4" fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="202" y="197" text-anchor="middle" fill="#1b5e20">C.Step 1</text>
    <line x1="244" y1="191" x2="276" y2="191" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="276" y="178" width="84" height="26" rx="4" fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="318" y="197" text-anchor="middle" fill="#1b5e20">C.Step 2</text>
    <line x1="360" y1="191" x2="392" y2="191" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="392" y="178" width="84" height="26" rx="4" fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="434" y="197" text-anchor="middle" fill="#1b5e20">C.Step 3</text>
    <line x1="476" y1="191" x2="508" y2="191" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="508" y="178" width="84" height="26" rx="4" fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="550" y="197" text-anchor="middle" fill="#1b5e20">C.Step 4</text>

    <text x="50" y="236" font-weight="700" fill="#5a3286">Module D</text>
    <rect x="160" y="218" width="84" height="26" rx="4" fill="#f3e8f7" stroke="#5a3286" stroke-width="1.2"/>
    <text x="202" y="237" text-anchor="middle" fill="#5a3286">D.Step 1</text>
    <line x1="244" y1="231" x2="276" y2="231" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="276" y="218" width="84" height="26" rx="4" fill="#f3e8f7" stroke="#5a3286" stroke-width="1.2"/>
    <text x="318" y="237" text-anchor="middle" fill="#5a3286">D.Step 2</text>
    <line x1="360" y1="231" x2="392" y2="231" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="392" y="218" width="84" height="26" rx="4" fill="#f3e8f7" stroke="#5a3286" stroke-width="1.2"/>
    <text x="434" y="237" text-anchor="middle" fill="#5a3286">D.Step 3</text>
    <line x1="476" y1="231" x2="508" y2="231" stroke="#6c757d" stroke-width="1" marker-end="url(#arrowSmall)"/>
    <rect x="508" y="218" width="84" height="26" rx="4" fill="#f3e8f7" stroke="#5a3286" stroke-width="1.2"/>
    <text x="550" y="237" text-anchor="middle" fill="#5a3286">D.Step 4</text>
  </g>

  <line x1="600" y1="256" x2="600" y2="288" stroke="#6c757d" stroke-width="2"
        stroke-dasharray="5 3" marker-end="url(#arrowGray)" fill="none"/>

  <rect x="30" y="295" width="1140" height="465" rx="14"
        fill="#fff8e6" stroke="#856404" stroke-width="2"/>
  <rect x="30" y="295" width="1140" height="50" rx="14"
        fill="#856404"/>
  <rect x="30" y="325" width="1140" height="20" fill="#856404"/>
  <text x="50" y="330" font-size="20" font-weight="700" fill="#fff8e6">
    PUMP THREAD (RUNTIME)
  </text>
  <text x="1150" y="330" text-anchor="end" font-size="13"
        fill="#fff3cd">
    owns the dispatch queue, shared resource, and worker pool
  </text>

  <text x="50" y="378" font-size="14" font-weight="700" fill="#7d6608">
    actual call sequence (round-robin):
  </text>

  <g font-size="13" font-weight="700">
    <rect x="60"  y="386" width="68" height="32" rx="5"
          fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="94"  y="407" text-anchor="middle" fill="#a94442">A.S1</text>
    <rect x="132" y="386" width="68" height="32" rx="5"
          fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="166" y="407" text-anchor="middle" fill="#1f4e79">B.S1</text>
    <rect x="204" y="386" width="68" height="32" rx="5"
          fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="238" y="407" text-anchor="middle" fill="#1b5e20">C.S1</text>
    <rect x="276" y="386" width="68" height="32" rx="5"
          fill="#f3e8f7" stroke="#5a3286" stroke-width="1.2"/>
    <text x="310" y="407" text-anchor="middle" fill="#5a3286">D.S1</text>

    <line x1="354" y1="383" x2="354" y2="421"
          stroke="#856404" stroke-width="1" stroke-dasharray="2 2"/>

    <rect x="364" y="386" width="68" height="32" rx="5"
          fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="398" y="407" text-anchor="middle" fill="#a94442">A.S2</text>
    <rect x="436" y="386" width="68" height="32" rx="5"
          fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="470" y="407" text-anchor="middle" fill="#1f4e79">B.S2</text>
    <rect x="508" y="386" width="68" height="32" rx="5"
          fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="542" y="407" text-anchor="middle" fill="#1b5e20">C.S2</text>
    <rect x="580" y="386" width="68" height="32" rx="5"
          fill="#f3e8f7" stroke="#5a3286" stroke-width="2.5"/>
    <text x="614" y="407" text-anchor="middle" fill="#5a3286">D.S2</text>

    <line x1="658" y1="383" x2="658" y2="421"
          stroke="#856404" stroke-width="1" stroke-dasharray="2 2"/>

    <rect x="668" y="386" width="68" height="32" rx="5"
          fill="#fdecec" stroke="#a94442" stroke-width="1.2"/>
    <text x="702" y="407" text-anchor="middle" fill="#a94442">A.S3</text>
    <rect x="740" y="386" width="68" height="32" rx="5"
          fill="#e6f0fa" stroke="#1f4e79" stroke-width="1.2"/>
    <text x="774" y="407" text-anchor="middle" fill="#1f4e79">B.S3</text>
    <rect x="812" y="386" width="68" height="32" rx="5"
          fill="#e6f5e9" stroke="#1b5e20" stroke-width="1.2"/>
    <text x="846" y="407" text-anchor="middle" fill="#1b5e20">C.S3</text>
    <rect x="884" y="386" width="68" height="32" rx="5"
          fill="#f3e8f7" stroke="#5a3286" stroke-width="2.5"/>
    <text x="918" y="407" text-anchor="middle" fill="#5a3286">D.S3</text>

    <line x1="962" y1="383" x2="962" y2="421"
          stroke="#856404" stroke-width="1" stroke-dasharray="2 2"/>

    <text x="976" y="407" font-size="13" font-weight="400"
          fill="#7d6608">
      ... round 4, 5, ...
    </text>
  </g>

  <text x="202" y="442" font-size="13" font-weight="700"
        fill="#7d6608" text-anchor="middle">round 1</text>
  <text x="506" y="442" font-size="13" font-weight="700"
        fill="#7d6608" text-anchor="middle">round 2</text>
  <text x="810" y="442" font-size="13" font-weight="700"
        fill="#7d6608" text-anchor="middle">round 3</text>

  <line x1="94" y1="420" x2="94" y2="525"
        stroke="#155724" stroke-width="1.8" fill="none"
        marker-end="url(#arrowGreen)"/>
  <text x="104" y="470" font-size="13" font-weight="700" fill="#155724">access</text>
  <text x="104" y="488" font-size="13" fill="#155724">(no lock)</text>

  <line x1="470" y1="420" x2="470" y2="525"
        stroke="#155724" stroke-width="1.8" fill="none"
        marker-end="url(#arrowGreen)"/>
  <text x="480" y="470" font-size="13" font-weight="700" fill="#155724">access</text>
  <text x="480" y="488" font-size="13" fill="#155724">(no lock)</text>

  <path d="M 614 420 C 640 470 780 490 830 525"
        stroke="#004085" stroke-width="2.4" fill="none"
        marker-end="url(#arrowBlue)"/>
  <text x="730" y="468" font-size="14" font-weight="700" fill="#004085"
        font-family="Consolas, 'Courier New', monospace">UF_ASYNC</text>
  <text x="730" y="486" font-size="13" fill="#004085">
    D.S2 body sent to pool
  </text>

  <path d="M 900 525 C 905 480 918 460 918 420"
        stroke="#004085" stroke-width="2.4" fill="none"
        stroke-dasharray="6 4"
        marker-end="url(#arrowBlue)"/>
  <text x="1030" y="468" font-size="14" font-weight="700"
        fill="#004085" text-anchor="middle">
    AsyncResult&lt;T&gt;()
  </text>
  <text x="1030" y="486" font-size="13" fill="#004085" text-anchor="middle">
    delivered to D.S3
  </text>

  <g>
    <path d="M 60 535 L 60 705 A 220 17 0 0 0 500 705 L 500 535 Z"
          fill="#d4edda" stroke="#155724" stroke-width="1.5"/>
    <ellipse cx="280" cy="535" rx="220" ry="17"
             fill="#d4edda" stroke="#155724" stroke-width="1.5"/>
  </g>
  <text x="280" y="588" text-anchor="middle" font-size="18"
        font-weight="700" fill="#155724">Shared Resource</text>
  <text x="280" y="617" text-anchor="middle" font-size="13" fill="#155724">
    serialised by the pump - no lock needed
  </text>
  <text x="280" y="660" text-anchor="middle" font-size="13" fill="#155724">
    any step can read or write directly
  </text>

  <rect x="600" y="525" width="540" height="220" rx="10"
        fill="#e7f1ff" stroke="#004085" stroke-width="2"/>
  <rect x="600" y="525" width="540" height="38" rx="10"
        fill="#cce5ff"/>
  <rect x="600" y="545" width="540" height="18" fill="#cce5ff"/>
  <line x1="600" y1="563" x2="1140" y2="563" stroke="#004085" stroke-width="2"/>
  <text x="620" y="551" font-size="15" font-weight="700" fill="#004085">
    Worker Pool
  </text>
  <text x="1130" y="551" text-anchor="end" font-size="13"
        fill="#004085">
    blocking I/O / CPU work
  </text>

  <g>
    <rect x="625" y="585" width="120" height="60" rx="6"
          fill="#ffffff" stroke="#004085" stroke-width="1.3"/>
    <text x="685" y="609" text-anchor="middle" font-size="13"
          font-weight="700" fill="#004085">thread 1</text>
    <text x="685" y="630" text-anchor="middle" font-size="13"
          fill="#6c757d">idle</text>

    <rect x="755" y="585" width="120" height="60" rx="6"
          fill="#ffe082" stroke="#856404" stroke-width="2"/>
    <text x="815" y="609" text-anchor="middle" font-size="13"
          font-weight="700" fill="#5d4400">thread 2</text>
    <text x="815" y="630" text-anchor="middle" font-size="13"
          fill="#5d4400">running D.S2</text>

    <rect x="885" y="585" width="120" height="60" rx="6"
          fill="#ffffff" stroke="#004085" stroke-width="1.3"/>
    <text x="945" y="609" text-anchor="middle" font-size="13"
          font-weight="700" fill="#004085">thread 3</text>
    <text x="945" y="630" text-anchor="middle" font-size="13"
          fill="#6c757d">idle</text>

    <rect x="1015" y="585" width="120" height="60" rx="6"
          fill="#ffffff" stroke="#004085" stroke-width="1.3"/>
    <text x="1075" y="609" text-anchor="middle" font-size="13"
          font-weight="700" fill="#004085">thread N</text>
    <text x="1075" y="630" text-anchor="middle" font-size="13"
          fill="#6c757d">idle</text>
  </g>

  <text x="870" y="675" text-anchor="middle" font-size="13"
        fill="#004085">
    free threads pick up submitted work; pump receives the result on the next step
  </text>
  <text x="870" y="700" text-anchor="middle" font-size="13"
        fill="#004085">
    pump thread itself is never blocked
  </text>

  <rect x="50" y="780" width="1100" height="36" rx="6"
        fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
  <text x="600" y="803" text-anchor="middle" font-size="13" fill="#495057">
    <tspan font-weight="700" fill="#212529">structural guarantees:</tspan>
    no locks needed   |   no deadlocks possible   |   no data races   |   fair / deterministic dispatch
  </text>
</svg>

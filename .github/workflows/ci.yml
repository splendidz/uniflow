name: ci

on:
  push:
    branches: [ master, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  # Badge-driving job. The framework is a single header with no external deps,
  # so the shared_ostream example builds and runs identically on Linux, macOS,
  # and Windows. This is the gate.
  verify:
    name: ${{ matrix.os }} / ${{ matrix.cxx }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cxx: g++ }
          - { os: ubuntu-latest, cxx: clang++ }
          - { os: macos-latest,  cxx: clang++ }
    steps:
      - uses: actions/checkout@v4
      - name: Build and run shared_ostream
        shell: bash
        run: |
          set -euo pipefail
          ${{ matrix.cxx }} -std=c++17 -O2 -pthread -I cpp cpp/examples/shared_ostream/*.cpp -o shared_ostream
          ./shared_ostream

  windows-msvc:
    name: windows-latest / msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build and run shared_ostream
        shell: cmd
        run: |
          cl /nologo /std:c++17 /EHsc /I cpp cpp\examples\shared_ostream\*.cpp /Fe:shared_ostream.exe || exit /b 1
          shared_ostream.exe || exit /b 1

  # Broader example builds. Best-effort (continue-on-error) so a toolchain or
  # runner-SDK quirk never reds the badge; the verify job above is the gate.
  examples-posix:
    name: examples (posix, best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Build the portable console examples (g++)
        shell: bash
        run: |
          set -euo pipefail
          # The two flagships fall back to an ANSI console renderer off Windows.
          # weather_llm is Windows/WinHTTP-only and is skipped here.
          for e in simulator message_dispatch queue_drain city_traffic pick_and_place; do
            echo "::group::build $e"
            g++ -std=c++17 -O2 -pthread -I cpp cpp/examples/$e/*.cpp -o "$e"
            echo "::endgroup::"
          done

  examples-windows:
    name: examples (windows, best-effort)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Build all examples (MSVC)
        shell: cmd
        run: |
          for %%e in (simulator message_dispatch queue_drain) do (
            cl /nologo /std:c++17 /EHsc /I cpp cpp\examples\%%e\*.cpp /Fe:%%e.exe || exit /b 1
          )
          for %%e in (city_traffic pick_and_place) do (
            cl /nologo /std:c++17 /EHsc /I cpp cpp\examples\%%e\*.cpp /Fe:%%e.exe /link user32.lib gdi32.lib || exit /b 1
          )
          cl /nologo /std:c++17 /EHsc /I cpp cpp\examples\weather_llm\*.cpp /Fe:weather_llm.exe /link winhttp.lib || exit /b 1
